<!DOCTYPE html>
<html lang="sk">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-19CM7TCLNT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-19CM7TCLNT');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVEFILM - Svadobný Kameraman</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='50%' x='50%' font-size='80' text-anchor='middle' dominant-baseline='central'%3E💍%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        body {
            background: radial-gradient(circle, #f9f0df 0%, #e6be8a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 350px;
            background: #fdfaf5;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid #c5a059;
            display: flex;
            flex-direction: column;
            position: relative;
            margin-bottom: 15px; 
        }

        .top-image {
            height: 180px;
            flex-shrink: 0;
            background-image: url('https://raw.githubusercontent.com/jozmas/my-images/main/sv-video.avif');
            background-size: cover;
            background-position: 15% center;
            position: relative;
        }

        .top-image::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 45px;
            background: #0d1b3e;
            clip-path: polygon(0 75%, 100% 0, 100% 100%, 0 100%);
        }

        .content {
            padding: 10px 20px;
            background: #fdfaf5;
        }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 700;
            color: #0d1b3e;
            letter-spacing: 2px;
            margin: 5px 0 0 0;
            text-transform: uppercase;
        }

        .logo-sub {
            font-size: 9px;
            color: #c5a059;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -3px;
            display: block;
            font-weight: bold;
        }

        h1 {
            color: #0d1b3e;
            font-size: 17px;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
        }

        .slogan {
            color: #555;
            font-size: 13px;
            margin-bottom: 10px;
            font-style: italic;
        }

        .services {
            list-style: none;
            padding: 0;
            margin: 0 auto 10px auto;
            display: inline-block;
            text-align: left;
            font-size: 13px;
            color: #333;
        }

        .services li { margin-bottom: 3px; padding-left: 20px; position: relative; }
        .services li::before { content: '•'; color: #c5a059; position: absolute; left: 0; }

        .contacts {
            background: #0d1b3e;
            padding: 15px 20px;
            border-top: 4px solid #c5a059;
            flex-grow: 1;
            position: relative;
            text-align: left;
        }

        .contact-link {
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
            margin-bottom: 8px;
            font-size: 12px;
            width: 75%;
        }

        .icon { width: 22px; margin-right: 8px; color: #c5a059; text-align: center; font-size: 14px; }

        .qr-container {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .qr-container img { display: block; width: 60px; height: 60px; }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 5px;
            width: 70%;
        }

        .main-btn {
            background: #c5a059;
            color: #0d1b3e;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            text-align: center;
        }

        .secondary-btn {
            border: 1px solid #c5a059;
            color: #c5a059;
            padding: 8px;
            text-transform: uppercase;
            font-size: 10px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }

        .share-area {
            text-align: center;
            width: 350px;
            padding-bottom: 10px;
        }

        .share-label {
            font-size: 11px;
            color: #0d1b3e;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .share-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            align-items: center;
        }

        .share-item {
            background: white;
            color: #0d1b3e;
            width: 38px;
            height: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            text-decoration: none;
            border: 1px solid #c5a059;
            font-size: 16px;
        }

        .copy-link-btn {
            background: #0d1b3e;
            color: white;
            border: 1px solid #c5a059;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 9px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/jozmas/my-images/main/lovefilm.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <div class="top-image"></div>
    <div class="content">
        <p class="logo-text">LOVEFILM</p>
        <span class="logo-sub">MOTION PICTURES</span>
        <h1>Svadobný kameraman</h1>
        <p class="slogan">Zachytíme váš jedinečný deň</p>
        <ul class="services">
            <li>Filmové svadobné klipy</li>
            <li>Celodenný záznam a spracovanie</li>
            <li>Profesionálna postprodukcia</li>
        </ul>
    </div>
    <div class="contacts">
        <a href="tel:+421950535194" class="contact-link"><i class="fas fa-phone icon"></i> +421 950 535 194</a>
        <a href="mailto:lovefilmmotionpictures@gmail.com" class="contact-link"><i class="fas fa-envelope icon"></i> lovefilmmotionpictures@gmail.com</a>
        <a href="https://www.facebook.com/svadobnykameramanorava" target="_blank" class="contact-link"><i class="fab fa-facebook-f icon"></i> Facebook: LOVEFILM</a>
        <div class="btn-container">
            <a href="https://lovefilm.rf.gd/?i=1" target="_blank" class="main-btn">Rezervuj si termín</a>
            <a href="https://www.facebook.com/svadobnykameramanorava" target="_blank" class="secondary-btn">Portfólio</a>
        </div>
        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://jozmas.github.io/lovefilm/" alt="QR Vizitka">
        </div>
    </div>
</div>

<div class="share-area">
    <div class="share-label">Odporučte nás ďalej</div>
    <div class="share-buttons">
        <a href="https://www.facebook.com/sharer/sharer.php?u=https://jozmas.github.io/lovefilm/" target="_blank" class="share-item">
            <i class="fab fa-facebook-f"></i>
        </a>
        <a href="https://twitter.com/intent/tweet?url=https://jozmas.github.io/lovefilm/" target="_blank" class="share-item">
            <i class="fab fa-x-twitter"></i>
        </a>
        <a href="https://api.whatsapp.com/send?text=Pozri si túto svadobnú vizitku: https://jozmas.github.io/lovefilm/" target="_blank" class="share-item">
            <i class="fab fa-whatsapp"></i>
        </a>
        <button class="copy-link-btn" onclick="copyURL()" id="copyBtn">Kopírovať odkaz</button>
    </div>
</div>

<script>
    // Funkcia na spustenie hudby pri prvom kliknutí
    document.addEventListener('click', function() {
        const audio = document.getElementById('bgMusic');
        if (audio.paused) {
            audio.play().catch(e => console.log("Audio autoplay blocked or failed."));
            audio.volume = 0.4; // Hlasitosť na 40%
        }
    }, { once: true });

    function copyURL() {
        const url = "https://jozmas.github.io/lovefilm/";
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.getElementById('copyBtn');
            const oldText = btn.innerText;
            btn.innerText = "Skopírované!";
            btn.style.background = "#c5a059";
            setTimeout(() => {
                btn.innerText = oldText;
                btn.style.background = "#0d1b3e";
            }, 2000);
        });
    }
</script>

</body>
</html>
