<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVEFILM - Svadobný Kameraman</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💍%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        body {
            background: radial-gradient(circle, #f9f0df 0%, #e6be8a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 350px;
            max-height: 98vh;
            background: #fdfaf5;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 45px rgba(0,0,0,0.2);
            text-align: center;
            border: 1px solid #c5a059;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .top-image {
            height: 180px;
            flex-shrink: 0;
            background-image: url('https://raw.githubusercontent.com/jozmas/my-images/main/sv-video.avif');
            background-size: cover;
            background-position: 15% center;
            position: relative;
        }

        .top-image::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 45px;
            background: #0d1b3e;
            clip-path: polygon(0 75%, 100% 0, 100% 100%, 0 100%);
        }

        .content {
            padding: 10px 20px;
            background: #fdfaf5;
        }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 700;
            color: #0d1b3e;
            letter-spacing: 2px;
            margin: 5px 0 0 0;
            text-transform: uppercase;
        }

        .logo-sub {
            font-size: 9px;
            color: #c5a059;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -3px;
            display: block;
            font-weight: bold;
        }

        h1 {
            color: #0d1b3e;
            font-size: 17px;
            margin: 12px 0 5px 0;
            text-transform: uppercase;
        }

        .slogan {
            color: #555;
            font-size: 13px;
            margin-bottom: 12px;
            font-style: italic;
        }

        .services {
            list-style: none;
            padding: 0;
            margin: 0 auto 12px auto;
            display: inline-block;
            text-align: left;
            font-size: 12px;
            color: #333;
        }

        .services li {
            margin-bottom: 4px;
            padding-left: 20px;
            position: relative;
        }

        .services li::before {
            content: '•';
            color: #c5a059;
            position: absolute;
            left: 0;
        }

        .contacts {
            background: #0d1b3e;
            padding: 20px;
            border-top: 4px solid #c5a059;
            flex-grow: 1;
            position: relative;
            text-align: left;
        }

        .contact-link {
            display: flex;
            align-items: center;
            color: white;
            text-decoration: none;
            margin-bottom: 10px;
            font-size: 12px;
            transition: color 0.3s;
            width: 75%; /* Necháva miesto pre QR kód */
        }

        .contact-link:hover { color: #c5a059; }

        .icon {
            width: 22px;
            margin-right: 8px;
            color: #c5a059;
            text-align: center;
            font-size: 14px;
        }

        .qr-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .qr-container img {
            display: block;
            width: 65px;
            height: 65px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 5px;
            width: 70%;
        }

        .main-btn {
            background: #c5a059;
            color: #0d1b3e;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            text-align: center;
        }

        .secondary-btn {
            border: 1px solid #c5a059;
            color: #c5a059;
            padding: 8px;
            text-transform: uppercase;
            font-size: 10px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="top-image"></div>
    
    <div class="content">
        <p class="logo-text">LOVEFILM</p>
        <span class="logo-sub">MOTION PICTURES</span>
        
        <h1>Svadobný kameraman</h1>
        <p class="slogan">Zachytíme váš jedinečný deň</p>

        <ul class="services">
            <li>Filmové svadobné klipy</li>
            <li>Celodenný záznam a spracovanie</li>
            <li>Profesionálna postprodukcia</li>
        </ul>
    </div>

    <div class="contacts">
        <a href="tel:+421950535194" class="contact-link">
            <i class="fas fa-phone icon"></i> +421 950 535 194
        </a>

        <a href="mailto:lovefilmmotionpictures@gmail.com" class="contact-link">
            <i class="fas fa-envelope icon"></i> lovefilmmotionpictures@gmail.com
        </a>

        <a href="https://www.facebook.com/svadobnykameramanorava" target="_blank" class="contact-link">
            <i class="fab fa-facebook-f icon"></i> Facebook: LOVEFILM
        </a>

        <div class="btn-container">
            <a href="https://lovefilm.rf.gd/?i=1" target="_blank" class="main-btn">Rezervuj si termín</a>
            <a href="https://www.facebook.com/svadobnykameramanorava" target="_blank" class="secondary-btn">Portfólio</a>
        </div>

        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://jozmas.github.io/lovefilm/" alt="QR Vizitka">
        </div>
    </div>
</div>

</body>
</html>
